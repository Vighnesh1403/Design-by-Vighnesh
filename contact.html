<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <!-- Custom Fonts -->
    <link rel="stylesheet" href="css/satoshi.css" />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/contact.css" />
    <link rel="stylesheet" href="css/responsive.css">
  </head>

  <style>
    body {
      background-color: #fff;
    }

    .card {
      border: none;
    }
  </style>

  <body>
    <div id="liquid-glass-cursor"></div>

    <div class="container py-4">
      <!-- Navbar -->
      <nav class="navbar-custom">
        <div class="nav-links">
          <a href="index.html">Work</a>
          <a href="about.html">About</a>
          <a class="active" href="#">Contact</a>
        </div>
      </nav>

      <!-- Grid Layout -->
      <div class="main-grid mb-5">
        <!-- CV -->
        <div
          class="card cv-card"
          onclick="
            window.open(
              'https://drive.google.com/file/d/1aJh5O4B_ki4EDfW89nRKxlp6zdwZISZr/view?usp=sharing',
            )
          "
        >
          <div class="card-sub">Learn More</div>
          <div class="card-title-contact">
            <img src="assets/images/google-drive.png" alt="" />
            <span>View CV</span>
          </div>
          <div class="arrow-icon">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-arrow-up-right-icon lucide-arrow-up-right"
            >
              <path d="M7 7h10v10" />
              <path d="M7 17 17 7" />
            </svg>
          </div>
        </div>

        <!-- dribble -->
        <div
          class="card dribble-card"
          onclick="window.open('https://dribbble.com/vighnesh1403')"
        >
          <div class="card-sub">Visit</div>
          <div class="card-title-contact">
            <img src="assets/images/dribble.png" alt="" />
            <span>Dribble</span>
          </div>
          <div class="arrow-icon">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-arrow-up-right-icon lucide-arrow-up-right"
            >
              <path d="M7 7h10v10" />
              <path d="M7 17 17 7" />
            </svg>
          </div>
        </div>

        <!-- linkedin -->
        <div
          class="card linkedin-card"
          onclick="
            window.open(
              'https://www.linkedin.com/in/vighnesh-bidaye-ab0590259/',
            )
          "
        >
          <div class="card-sub">Connect</div>
          <div class="card-title-contact">
            <img src="assets/images/linkedin.png" alt="" />
            <span>Linkedin</span>
          </div>
          <div class="arrow-icon">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-arrow-up-right-icon lucide-arrow-up-right"
            >
              <path d="M7 7h10v10" />
              <path d="M7 17 17 7" />
            </svg>
          </div>
        </div>

        <!-- instagram -->
        <div
          class="card instagram-card"
          onclick="window.open('https://www.instagram.com/_.vighneshhh.___/')"
        >
          <div class="card-sub">Follow</div>
          <div class="card-title-contact">
            <img src="assets/images/instagram.png" alt="" />
            <span>Instagram</span>
          </div>
          <div class="arrow-icon">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-arrow-up-right-icon lucide-arrow-up-right"
            >
              <path d="M7 7h10v10" />
              <path d="M7 17 17 7" />
            </svg>
          </div>
        </div>

        <!-- mail -->
        <div
          class="card mail-card"
          onclick="window.open('mailto:vighneshbidaye2003@gmail.com')"
        >
          <div class="card-sub">Say Hi</div>
          <div class="card-title-contact">
            <img src="assets/images/gmail.png" alt="" />
            <span>vighneshbidaye2003@gmail.com</span>
          </div>
          <div class="arrow-icon">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-arrow-up-right-icon lucide-arrow-up-right"
            >
              <path d="M7 7h10v10" />
              <path d="M7 17 17 7" />
            </svg>
          </div>
        </div>
      </div>
      <footer class="footer">
        <!-- LEFT -->
        <div class="footer-left">
          <div class="location-hover">
            <div class="location-info">
              <span>Mumbai</span>
              <span>•</span>
              <span>26°C</span>
              <span>•</span>
              <span id="clock">11:08:53</span>
            </div>

            <!-- HOVER IMAGES -->
            <div class="hover-preview">
              <img
                src="assets/images/gateway-of-india.jpg"
                class="preview-img"
              />
              <img
                src="assets/images/bandra-warli-sea-link.jpg"
                class="preview-img"
              />
              <img src="assets/images/marins.jpg" class="preview-img" />
              <img src="assets/images/csmt.jpg" class="preview-img" />
              <img src="assets/images/night-view.png" class="preview-img" />
            </div>
          </div>
        </div>

        <!-- RIGHT -->
        <div class="footer-right">
          <a href="#">X (Twitter)</a>

          <div class="divider"></div>

          <a href="#">LinkedIn</a>

          <div class="divider"></div>

          <a href="#">Instagram</a>

          <a href="#">CV</a>
